name: static-analysis
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
      - development
      - staging
      - "release/**"
      - "hotfix/**"
  schedule:
    - cron: "40 7 * * 1"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    env:
      SEMGREP_VERSION: "1.167.0"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Semgrep deterministic policy scan
        run: pipx run "semgrep==${SEMGREP_VERSION}" scan --config .semgrep.yml --error --exclude ".git" .
