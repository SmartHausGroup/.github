name: SMARTHAUS Repo CI/CD Conformance

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
      - development
      - staging
      - "release/**"
      - "hotfix/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smarthaus-cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-cicd-conformance:
    name: repo-cicd-conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install MA validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
      - name: Validate repo CI/CD conformance
        run: make repo-cicd-conformance
      - name: Validate full repo gate
        run: AI_AUTOFIX=0 make ai-validate-full

  evidence-pack:
    name: evidence-pack
    runs-on: ubuntu-latest
    needs:
      - repo-cicd-conformance
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Build evidence pack
        run: make ai-evidence-pack
      - name: Verify evidence pack
        run: make ai-pack-verify
