name: supply-chain
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
      - development
      - staging
      - "release/**"
      - "hotfix/**"
  schedule:
    - cron: "20 7 * * 1"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  supply-chain-policy:
    name: supply-chain-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install policy dependencies
        run: python -m pip install pyyaml
      - name: Verify supply-chain policy
        run: python3 scripts/supply_chain_policy.py --check

  sbom-vulnerability-budget:
    name: sbom-vulnerability-budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Syft and Grype with checksum verification
        run: |
          set -euo pipefail
          TOOL_DIR="$RUNNER_TEMP/smarthaus-tools"
          DOWNLOAD_DIR="$RUNNER_TEMP/smarthaus-downloads"
          mkdir -p "$TOOL_DIR" "$DOWNLOAD_DIR"
          SYFT_VERSION=$(python3 -c 'import json; print(json.load(open("compliance/supply-chain-tools.json"))["syft"])')
          GRYPE_VERSION=$(python3 -c 'import json; print(json.load(open("compliance/supply-chain-tools.json"))["grype"])')

          curl -sSfL -o "$DOWNLOAD_DIR/syft_${SYFT_VERSION}_linux_amd64.tar.gz" "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -sSfL -o "$DOWNLOAD_DIR/syft_${SYFT_VERSION}_checksums.txt" "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt"
          (cd "$DOWNLOAD_DIR" && grep "syft_${SYFT_VERSION}_linux_amd64.tar.gz" "syft_${SYFT_VERSION}_checksums.txt" | sha256sum -c -)
          tar -xzf "$DOWNLOAD_DIR/syft_${SYFT_VERSION}_linux_amd64.tar.gz" -C "$TOOL_DIR" syft

          curl -sSfL -o "$DOWNLOAD_DIR/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          curl -sSfL -o "$DOWNLOAD_DIR/grype_${GRYPE_VERSION}_checksums.txt" "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_checksums.txt"
          (cd "$DOWNLOAD_DIR" && grep "grype_${GRYPE_VERSION}_linux_amd64.tar.gz" "grype_${GRYPE_VERSION}_checksums.txt" | sha256sum -c -)
          tar -xzf "$DOWNLOAD_DIR/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" -C "$TOOL_DIR" grype
      - name: Generate SBOM, enforce license policy and vulnerability budget
        run: |
          set -euo pipefail
          TOOL_DIR="$RUNNER_TEMP/smarthaus-tools"
          SBOM_PATH="$RUNNER_TEMP/sbom.spdx.json"
          GRYPE_PATH="$RUNNER_TEMP/grype.json"
          "$TOOL_DIR/syft" dir:. \
            --exclude "./.venv/**" \
            --exclude "./node_modules/**" \
            --exclude "./app/desktop/node_modules/**" \
            --exclude "./app/ui/node_modules/**" \
            --exclude "./app/extension/node_modules/**" \
            --exclude "./app/desktop/src-tauri/target/**" \
            --exclude "./app/desktop/src-tauri/resources/said-runtime/backend/_internal/**" \
            -o spdx-json="$SBOM_PATH"
          python3 scripts/supply_chain_policy.py --license-spdx "$SBOM_PATH" --license-policy compliance/license-policy.json
          "$TOOL_DIR/grype" sbom:"$SBOM_PATH" -o json --file "$GRYPE_PATH"
          python3 scripts/supply_chain_policy.py --grype-json "$GRYPE_PATH" --vulnerability-budget compliance/vulnerability-budget.yml
