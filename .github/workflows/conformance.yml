name: conformance
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
      - development
      - staging
      - "release/**"
      - "hotfix/**"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Install MA validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
      - name: Verify agent-file gate
        run: node tools/agents/sync-agent-files.mjs --check
      - name: Validate MA repo conformance
        run: make repo-cicd-conformance
      - name: Validate full MA gate
        run: AI_AUTOFIX=0 make ai-validate-full
