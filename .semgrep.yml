rules:
  - id: smarthaus.public-profile.subprocess-shell-true
    languages:
      - python
    severity: ERROR
    message: shell=True is blocked in the public organization profile repository.
    pattern-either:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.check_call(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)

  - id: smarthaus.public-profile.yaml-unsafe-load
    languages:
      - python
    severity: ERROR
    message: yaml.load without SafeLoader is blocked in public-profile tooling.
    pattern: yaml.load(...)
