rules:
  - id: smarthaus.python.subprocess-shell-true
    languages:
      - python
    severity: ERROR
    message: shell=True is blocked unless a repo-specific MA invariant proves bounded command construction.
    pattern-either:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.check_call(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)

  - id: smarthaus.python.yaml-unsafe-load
    languages:
      - python
    severity: ERROR
    message: yaml.load without SafeLoader is blocked by the template security invariant.
    pattern: yaml.load(...)
