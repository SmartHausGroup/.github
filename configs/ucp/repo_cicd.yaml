schema_version: 0.1.0
repository:
  owner: SmartHausGroup
  name: .github
  canonical_path: ${SMARTHAUS_GITHUB_ORG_PROFILE_REPO_ROOT}
  remote: https://github.com/SmartHausGroup/.github.git
profile:
  primary: org-profile-governance
  secondary:
    - repo-cicd-conformance
protected_branches:
  - pattern: main
    requires_pull_request: false
    blocks_direct_push: true
    required_approvals: 0
    requires_codeowners: false
    requires_signed_commits: true
    requires_linear_history: true
    blocks_force_push: true
    blocks_deletion: true
    requires_conversation_resolution: false
    required_checks:
      - repo-cicd-conformance
      - evidence-pack
      - verify
      - validate
      - secret-scan
      - zizmor
      - supply-chain-policy
      - sbom-vulnerability-budget
      - trufflehog
      - semgrep
  - pattern: master
    requires_pull_request: false
    blocks_direct_push: true
    required_approvals: 0
    requires_codeowners: false
    requires_signed_commits: true
    requires_linear_history: true
    blocks_force_push: true
    blocks_deletion: true
    requires_conversation_resolution: false
    required_checks:
      - repo-cicd-conformance
      - evidence-pack
      - verify
      - validate
      - secret-scan
      - zizmor
      - supply-chain-policy
      - sbom-vulnerability-budget
      - trufflehog
      - semgrep
  - pattern: development
    requires_pull_request: false
    blocks_direct_push: true
    required_approvals: 0
    requires_codeowners: false
    requires_signed_commits: true
    requires_linear_history: true
    blocks_force_push: true
    blocks_deletion: true
    requires_conversation_resolution: false
    required_checks:
      - repo-cicd-conformance
      - evidence-pack
      - verify
      - validate
      - secret-scan
      - zizmor
      - supply-chain-policy
      - sbom-vulnerability-budget
      - trufflehog
      - semgrep
  - pattern: dev
    requires_pull_request: false
    blocks_direct_push: true
    required_approvals: 0
    requires_codeowners: false
    requires_signed_commits: true
    requires_linear_history: true
    blocks_force_push: true
    blocks_deletion: true
    requires_conversation_resolution: false
    required_checks:
      - repo-cicd-conformance
      - evidence-pack
      - verify
      - validate
      - secret-scan
      - zizmor
      - supply-chain-policy
      - sbom-vulnerability-budget
      - trufflehog
      - semgrep
  - pattern: staging
    requires_pull_request: false
    blocks_direct_push: true
    required_approvals: 0
    requires_codeowners: false
    requires_signed_commits: true
    requires_linear_history: true
    blocks_force_push: true
    blocks_deletion: true
    requires_conversation_resolution: false
    required_checks:
      - repo-cicd-conformance
      - evidence-pack
      - verify
      - validate
      - secret-scan
      - zizmor
      - supply-chain-policy
      - sbom-vulnerability-budget
      - trufflehog
      - semgrep
required_checks:
  - repo-cicd-conformance
  - evidence-pack
  - verify
  - validate
  - secret-scan
  - zizmor
  - supply-chain-policy
  - sbom-vulnerability-budget
  - trufflehog
  - semgrep
  - ma-intent-and-invariants
  - notebook-governance
  - scorecard-green
  - unit-tests
  - lint-or-static-analysis
  - ruleset-conformance
make_targets:
  ai-status: make ai-status
  ai-validate: make ai-validate
  ai-validate-full: make ai-validate-full
  ai-evidence-pack: make ai-evidence-pack
  ai-pack-verify: make ai-pack-verify
  prepare-publication: make prepare-publication
  publication-ready: make publication-ready
  push-safe: make push-safe
ma_evidence:
  intent: docs/ma/cicd_conformance_phase0_intent.md
  formula: docs/ma/cicd_conformance_phase1_formula.md
  calculus: docs/ma/cicd_conformance_phase2_calculus.md
  lemmas: docs/ma/cicd_conformance_phase3_lemmas.md
  invariants:
    - invariants/cicd_conformance.yaml
  notebooks:
    - notebooks/ma/cicd_conformance.ipynb
  scorecards:
    - artifacts/scorecards/cicd_conformance.json
locks:
  sources: configs/ucp/standard_sources.lock
  toolchain: configs/ucp/standard_toolchain.lock
advisory_gates:
  - org-profile-content-depth-review
release_policy:
  releases_artifacts: false
  requires_environment_approval: true
  requires_signed_provenance: true
ucp_policy:
  requires_ucp_receipt: true
  receipt_subjects:
    - commit
    - push
    - pull_request
    - merge
    - release
    - deploy
  blocks_without_remote_ci_evidence: true
